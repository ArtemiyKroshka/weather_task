openapi: "3.0.3"
info:
  title: Weather Subscription API
  version: "1.0.0"
  description: >
    Subscribe to periodic weather updates for any city.
    Receive hourly or daily emails with current temperature,
    humidity, and weather conditions.
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/weather:
    get:
      summary: Get current weather for a city
      tags: [weather]
      parameters:
        - name: city
          in: query
          required: true
          schema:
            type: string
          example: Kyiv
      responses:
        "200":
          description: Current weather data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Weather"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /api/subscriptions:
    post:
      summary: Subscribe to weather updates
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, city, frequency]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                city:
                  type: string
                  example: Kyiv
                frequency:
                  type: string
                  enum: [hourly, daily]
                  example: daily
      responses:
        "200":
          description: Subscription created; confirmation email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /api/subscriptions/confirm/{token}:
    post:
      summary: Confirm a subscription
      tags: [subscriptions]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Subscription confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /api/subscriptions/{token}:
    delete:
      summary: Unsubscribe from weather updates
      tags: [subscriptions]
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Unsubscribed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

components:
  schemas:
    Weather:
      type: object
      properties:
        temperature:
          type: number
          description: Temperature in Celsius
          example: 18.5
        humidity:
          type: number
          description: Relative humidity in percent
          example: 65
        description:
          type: string
          description: Short weather description
          example: Partly cloudy

    Message:
      type: object
      properties:
        message:
          type: string
          example: success

    Error:
      type: object
      properties:
        error:
          type: string
          example: city not found

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
